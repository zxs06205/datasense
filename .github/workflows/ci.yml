name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest matplotlib numpy
          pip install -e .
      - name: Test import
        run: python -c "from datasense.loader import load_csv; from datasense.stats import compute_stats; from datasense.visualize import plot_scatter; print('All imports OK')"
      - name: Run tests
        run: python -m pytest tests/ -v 2>&1 | tee pytest_output.txt
      - name: Show test output on failure
        if: failure()
        run: cat pytest_output.txt
